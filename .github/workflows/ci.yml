name: SyncDocs CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: syncdocs
          POSTGRES_USER: syncdocs
          POSTGRES_PASSWORD: syncdocs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build and test backend
        run: |
          cd backend
          mvn clean verify -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/syncdocs
          DB_USERNAME: syncdocs
          DB_PASSWORD: syncdocs
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MINIO_URL: http://localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test-secret
          SPRING_PROFILES_ACTIVE: test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd frontend
          npm run build
